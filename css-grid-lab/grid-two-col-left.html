<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Grid Lab - Left</title>

  <style>
    html {
      box-sizing: border-box;
    }

    *,
    *:before,
    *:after {
      box-sizing: inherit;
    }

    body {
      background-color: #ECECEC;
      font-family: Tahoma, Geneva, sans-serif;
      margin: 0;
      text-align: center;
    }

    h1 {
      color: #000;
      font-weight: normal;
      padding: 40px;
    }

    /* WRAPPER */
    #wrapper {
      width: 700px;
      height: 500px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #c0c0c0;

      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
    }

    /* BOXES */
    #navy {
      background: #001f3f;
      grid-column: 1;
      grid-row: 1 / span 3;
    }

    #teal {
      background: #39CCCC;
    }

    #blue {
      background: #0074D9;
    }

    #aqua {
      background: #7FDBFF;
    }

    /* CENTER BOX */
    #footer {
      background: #666;
      width: 120px;
      height: 120px;
      grid-column: 2;
      grid-row: 2;
      justify-self: center;
      align-self: center;
    }
  </style>
</head>

<body>

  <h1>Left Layout</h1>

  <section id="wrapper">
    <div id="navy">Navy</div>
    <div id="teal">Teal</div>
    <div id="blue">Blue</div>
    <div id="aqua">Aqua</div>
    <div id="footer">Center</div>
  </section>

</body>

</html>
