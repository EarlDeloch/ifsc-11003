<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Positioning Lab</title>

  <style>
    html {
      box-sizing: border-box;
    }

    *,
    *:before,
    *:after {
      box-sizing: inherit;
    }

    body {
      background-color: #ECECEC;
      font-weight: bold;
      font-family: Tahoma, Geneva, sans-serif;
      text-align: center;
      margin: 0;
      position: relative; /* makes body the reference */
    }

    /* Smaller centered white box */
    #wrapper {
      position: relative;
      background-color: #FFF;
      border: 1px solid #c0c0c0;
      width: 600px;
      height: 300px;
      margin: 100px auto;
    }

    /* Corner boxes (relative to PAGE) */
    #navy {
      position: absolute;
      top: 0;
      left: 0;
      width: 100px;
      height: 100px;
      background-color: #001f3f;
      color: white;
    }

    #teal {
      position: absolute;
      top: 0;
      right: 0;
      width: 100px;
      height: 100px;
      background-color: #39CCCC;
    }

    #blue {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100px;
      height: 100px;
      background-color: #0074D9;
    }

    #aqua {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 100px;
      height: 100px;
      background-color: #7FDBFF;
    }

    /* Center footer inside white box */
    #footer {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120px;
      height: 120px;
      background-color: #666;
      transform: translate(-50%, -50%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      margin-top: 30px;
      color: black;
      font-weight: normal;
    }
  </style>
</head>

<body>

  <h1>Exercise</h1>

  <!-- Page corner boxes -->
  <div id="navy">Navy</div>
  <div id="teal">Teal</div>
  <div id="blue">Blue</div>
  <div id="aqua">Aqua</div>

  <!-- Center content -->
  <section id="wrapper">
    <div id="footer">Footer</div>
  </section>

</body>
</html>
